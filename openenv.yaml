spec_version: 1
name: incident_forge
version: "1.0.0"
description: >
  Production Incident Response RL Environment — trains LLMs to diagnose
  and remediate production incidents in a simulated 7-service microservice
  architecture. Features 15 scenarios across 3 difficulty levels, procedural
  generation, 5-dimensional reward scoring, and curriculum learning.
type: agent-env
runtime: docker
app: incident_forge.server.app:app
port: 8000

action_space:
  type: json
  
observation_space:
  type: json

tasks:
  - id: easy_incident
    name: "Easy Incident"
    description: "Single root cause, obvious symptoms (e.g. connection pool full, disk full)."
    difficulty: easy
  - id: medium_incident
    name: "Medium Incident"
    description: "Cascading failures across 2-3 services (e.g. cascading timeout, DB replication lag)."
    difficulty: medium
  - id: hard_incident
    name: "Hard Incident"
    description: "Hidden root causes, non-obvious correlation (e.g. DNS cache poisoning, split-brain DB)."
    difficulty: hard
